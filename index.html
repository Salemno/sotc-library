<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stars of the City Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Stars of the City Library</h1>


    <div id="library-tabs">

    <button
        class="library-tab"
        data-library="templates"
    >
        Skill Templates
    </button>

    <button
        class="library-tab active"
        data-library="modules"
    >
        Skill Modules
    </button>

    <button
        class="library-tab"
        data-library="feats"
    >
        Feats
    </button>


    </div>

<div id="main-layout">
    <aside id="filters-panel">

<input
       type="text"
       id="search-bar"
       placeholder="Search skill modules..."
>

<div id="filters-container">

    <details
        id="tier-section"
        class="filter-group"
    >
        <summary>Tiers</summary>

        <div id="tier-filters"></div>
    </details>

    <details
        id="status-section"
        class="filter-group"
    >
        <summary>Statuses</summary>

        <div id="status-filters"></div>
    </details>

    <details
        id="tag-section"
        class="filter-group"
    >
        <summary>Tags</summary>

        <div id="tag-filters"></div>
    </details>

    <details
        id="effect-section"
        class="filter-group"
    >
        <summary>Effects</summary>

        <div id="effect-filters"></div>
    </details>

    <details
        id="source-section"
        class="filter-group"
    >
        <summary>Sources</summary>

        <div id="source-filters"></div>
    </details>

</div>

</aside>

<main id="results-panel">

       <div id="results-count"></div>
       <div id="skills-container"></div>
</main>
</div>
 

    <script src="script.js"></script>

</body>
</html>
